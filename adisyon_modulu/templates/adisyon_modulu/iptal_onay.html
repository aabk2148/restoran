{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <title>İptal Onayı - ELAKİ</title>
    <link rel="stylesheet" href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}">
<link rel="stylesheet" href="{% static 'vendor/bootstrap-icons/bootstrap-icons.css' %}">
    
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-danger text-white">
                        <h5 class="mb-0">⚠️ İptal İşlemi</h5>
                    </div>
                    <div class="card-body">
                        <h6 class="fw-bold">{{ item.urun.ad }}</h6>
                        <p class="text-muted">Mevcut Adet: {{ item.adet }}</p>
                        
                        <form method="POST">
                            {% csrf_token %}
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">İptal Edilecek Adet</label>
                                <input type="number" name="iptal_adet" class="form-control" 
                                       value="{{ item.adet }}" min="1" max="{{ item.adet }}" required>
                                <small class="text-muted">1 ile {{ item.adet }} arasında bir değer girin</small>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">İptal Sebebi</label>
                                <textarea name="sebep" class="form-control" rows="3" required></textarea>
                            </div>
                            
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-danger flex-grow-1">
                                    <i class="bi bi-check-circle"></i> İptal Et
                                </button>
                                <a href="javascript:history.back()" class="btn btn-secondary">
                                    Vazgeç
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="{% static 'vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
